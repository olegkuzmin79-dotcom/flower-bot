<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>{% block title %}Админ{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">
</head>
<body>
<div class="wrap">
  <header>
    <strong>Календарь-консьерж · админ</strong>
    <nav>
      <a href="{{ url_for('admin_dashboard') }}">Дашборд</a>
      <a href="{{ url_for('admin_clients') }}">Клиенты</a>
      <a href="{{ url_for('admin_celebrations') }}">Праздники</a>
      <a href="{{ url_for('admin_orders') }}">Заказы</a>
      <a href="{{ url_for('admin_logout') }}">Выход</a>
    </nav>
  </header>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="flash {{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>
</body>
</html>
